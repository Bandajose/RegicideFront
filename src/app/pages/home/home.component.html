<!-- ══════════════════════════════════════════════════════════
     PANTALLA DE BIENVENIDA  (solo cuando no hay nombre)
═══════════════════════════════════════════════════════════ -->
<div class="welcome" *ngIf="!hasName">
  <div class="welcome-card">
    <div class="game-logo">♠ Regicide ♠</div>
    <p class="welcome-sub">¿Cómo quieres que te llamen?</p>
    <input class="welcome-input"
           type="text"
           [(ngModel)]="tempName"
           placeholder="Tu nombre..."
           maxlength="20"
           (keyup.enter)="confirmName()"
           autofocus />
    <button class="welcome-btn" [disabled]="!tempName.trim()" (click)="confirmName()">
      Continuar
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     HOME PRINCIPAL  (una vez el nombre está guardado)
═══════════════════════════════════════════════════════════ -->
<div class="home" *ngIf="hasName">
  <div class="home-inner">

    <!-- Indicador de nombre -->
    <div class="name-pill">
      <span class="name-pill-label">Jugando como</span>
      <span class="name-pill-value">{{ playerName }}</span>
      <button class="name-pill-change" (click)="changeName()">Cambiar</button>
    </div>

    <div class="container-wrapper">

      <div class="container left-container">
        <h2>Sala</h2>

        <div class="input-container">
          <input type="text" [(ngModel)]="roomName" placeholder="Nombre de la sala" />
          <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
        </div>

        <div class="button-container">
          <button (click)="joinRoom()" [disabled]="loading">
            <span *ngIf="!loading">Unirse</span>
            <div *ngIf="loading" class="spinner"></div>
          </button>
        </div>

        <div class="button-container">
          <button class="btn-primary" (click)="createRoom()" [disabled]="loading">
            Crear Sala
          </button>
        </div>
      </div>

      <div class="container right-container">
        <h2>Salas Disponibles</h2>

        <div class="search-container">
          <input type="text" [(ngModel)]="searchQuery" placeholder="Filtrar salas..." />
          <button class="btn-search" (click)="searchRooms()">🔍</button>
        </div>

        <ul class="room-list">
          <li *ngFor="let room of filteredRooms" (click)="joinRoomByName(room.roomName)">
            <span class="room-name">{{ room.roomName }}</span>
            <span class="room-players">👥 {{ room.playerNumber }}/{{ room.maxPlayerNumber }}</span>
          </li>
          <li *ngIf="filteredRooms.length === 0" class="empty">
            Sin salas disponibles
          </li>
        </ul>

        <div class="pagination">
          <button (click)="prevPage()" [disabled]="dataRooms.currentPage === '1'">◀</button>
          <span>Página {{ dataRooms.currentPage }} de {{ dataRooms.totalPages }}</span>
          <button (click)="nextPage()" [disabled]="dataRooms.currentPage === dataRooms.totalPages">▶</button>
        </div>
      </div>

    </div>
  </div>
</div>
